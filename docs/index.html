<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Claude Artefacts</title>
    <style>
      :root {
        --bg: #fafaf9;
        --bg-card: #ffffff;
        --border: #e7e5e4;
        --border-hover: #d6d3d1;
        --text: #1c1917;
        --text-muted: #78716c;
        --accent: #d97757;
        --shadow: 0 1px 2px rgba(28, 25, 23, 0.04), 0 4px 16px rgba(28, 25, 23, 0.06);
        --shadow-hover: 0 2px 4px rgba(28, 25, 23, 0.06), 0 12px 28px rgba(28, 25, 23, 0.1);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1c1917;
          --bg-card: #262322;
          --border: #3a3633;
          --border-hover: #4d4744;
          --text: #f5f5f4;
          --text-muted: #a8a29e;
          --accent: #e08a6c;
          --shadow: 0 1px 2px rgba(0, 0, 0, 0.2), 0 4px 16px rgba(0, 0, 0, 0.3);
          --shadow-hover: 0 2px 4px rgba(0, 0, 0, 0.3), 0 12px 28px rgba(0, 0, 0, 0.45);
        }
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.55;
        -webkit-font-smoothing: antialiased;
        padding: clamp(1.5rem, 5vw, 4rem) clamp(1rem, 5vw, 2rem);
      }
      .wrap { max-width: 960px; margin: 0 auto; }
      header { margin-bottom: 2.5rem; }
      .kicker {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.8rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 0.75rem;
      }
      .kicker::before {
        content: "";
        width: 0.5rem; height: 0.5rem;
        border-radius: 50%;
        background: var(--accent);
      }
      h1 {
        font-size: clamp(1.75rem, 5vw, 2.75rem);
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      .subtitle {
        margin-top: 0.5rem;
        color: var(--text-muted);
        font-size: clamp(1rem, 2.5vw, 1.15rem);
        max-width: 46ch;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(min(100%, 280px), 1fr));
        gap: 1rem;
      }
      .card {
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 1.35rem;
        text-decoration: none;
        color: inherit;
        box-shadow: var(--shadow);
        transition: transform 0.18s ease, box-shadow 0.18s ease,
          border-color 0.18s ease;
      }
      .card:hover, .card:focus-visible {
        transform: translateY(-3px);
        box-shadow: var(--shadow-hover);
        border-color: var(--border-hover);
        outline: none;
      }
      .card:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
      .card-emoji { font-size: 1.6rem; line-height: 1; }
      .card-title { font-size: 1.1rem; font-weight: 650; letter-spacing: -0.01em; }
      .card-desc { color: var(--text-muted); font-size: 0.92rem; flex: 1; }
      .card-meta {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.5rem;
        margin-top: 0.25rem;
        font-size: 0.78rem;
        color: var(--text-muted);
      }
      .tag {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 0.1rem 0.55rem;
        font-weight: 500;
      }
      .empty {
        border: 1px dashed var(--border);
        border-radius: 14px;
        padding: 3rem 1.5rem;
        text-align: center;
        color: var(--text-muted);
      }
      .empty code {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 0.1rem 0.4rem;
        font-size: 0.85em;
      }
      footer {
        margin-top: 3rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--border);
        font-size: 0.82rem;
        color: var(--text-muted);
      }
      footer a { color: var(--accent); text-decoration: none; }
      footer a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <span class="kicker">Claude Code</span>
        <h1 id="title">Claude Artefacts</h1>
        <p class="subtitle" id="subtitle"></p>
      </header>
      <main id="grid" class="grid" aria-live="polite"></main>
      <footer>
        Собрано в паре с Claude Code ·
        <a href="https://github.com/GrafSoul/claude-artefacts">исходники на GitHub</a>
      </footer>
    </div>

    <script>
      const escape = (s) =>
        String(s ?? "").replace(/[&<>"']/g, (c) => ({
          "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
        })[c]);

      async function render() {
        const grid = document.getElementById("grid");
        let data;
        try {
          const res = await fetch("manifest.json", { cache: "no-store" });
          if (!res.ok) throw new Error(res.status);
          data = await res.json();
        } catch (e) {
          grid.innerHTML =
            '<div class="empty">Не удалось загрузить <code>manifest.json</code>.</div>';
          return;
        }

        if (data.title) document.getElementById("title").textContent = data.title;
        document.getElementById("subtitle").textContent = data.subtitle || "";

        const items = Array.isArray(data.artefacts) ? data.artefacts : [];
        if (items.length === 0) {
          grid.classList.remove("grid");
          grid.innerHTML =
            '<div class="empty">Пока пусто. Первый артефакт появится здесь, ' +
            "как только я добавлю его в <code>docs/</code> и запись в " +
            "<code>manifest.json</code>.</div>";
          return;
        }

        grid.innerHTML = items
          .map((a) => {
            const tags = (a.tags || [])
              .map((t) => `<span class="tag">${escape(t)}</span>`)
              .join("");
            const date = a.date ? `<span>${escape(a.date)}</span>` : "";
            const sep = tags && date ? "<span>·</span>" : "";
            return `<a class="card" href="${escape(a.path)}">
              ${a.emoji ? `<span class="card-emoji">${escape(a.emoji)}</span>` : ""}
              <span class="card-title">${escape(a.title)}</span>
              <span class="card-desc">${escape(a.description || "")}</span>
              <span class="card-meta">${date}${sep}${tags}</span>
            </a>`;
          })
          .join("");
      }

      render();
    </script>
  </body>
</html>
